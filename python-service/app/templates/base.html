<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>

    <style>
      :root {
        --bg: #f3f5f9;
        --panel: #ffffff;
        --text: #0b1324;
        --muted: #6b7280;
        --accent: #1d4ed8;
        --border: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 40px;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      main {
        max-width: 960px;
        margin: auto;
      }

      .report-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 36px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      }

      .report-header {
        border-bottom: 2px solid var(--border);
        padding-bottom: 18px;
        margin-bottom: 28px;
      }

      .report-title {
        font-size: 30px;
        font-weight: 700;
        margin: 0;
        letter-spacing: .3px;
      }

      .report-meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .branding {
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1px;
        color: var(--accent);
        text-transform: uppercase;
      }

      section + section {
        margin-top: 28px;
      }

      .section-title {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: .6px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th {
        text-align: left;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: .4px;
        padding: 10px;
        border-bottom: 2px solid var(--border);
      }

      td {
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }

      ol, ul {
        margin: 0;
        padding-left: 20px;
      }

      footer {
        margin-top: 30px;
        font-size: 13px;
        color: var(--muted);
        text-align: right;
      }

      .pill {
        background: #e0ecff;
        color: #1d4ed8;
        padding: 5px 10px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <main>
      <div class="report-card">

        <div class="report-header">
          <div class="branding">Equity Research Brief</div>
          <h1 class="report-title">{{ title }}</h1>
          <div class="report-meta">
            Generated at {{ generated_at }}
          </div>
        </div>

        {% block content %}{% endblock %}

      </div>

      <footer>
        Confidential — Generated {{ generated_at }}
      </footer>
    </main>
  </body>
</html>
